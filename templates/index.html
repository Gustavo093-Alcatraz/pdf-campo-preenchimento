<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Auto-Fields</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .drop-active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div
        class="max-w-xl w-full bg-white rounded-2xl shadow-xl overflow-hidden transition-all duration-300 hover:shadow-2xl">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-center text-white">
            <h1 class="text-3xl font-bold mb-2">PDF Transformer</h1>
            <p class="text-blue-100 opacity-90">Convert static placeholders to interactive fields instantly.</p>
        </div>

        <!-- Content -->
        <div class="p-8">
            <div id="drop-zone"
                class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer transition-colors duration-200 group hover:border-blue-400 hover:bg-gray-50">

                <div class="mb-4">
                    <div
                        class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                            </path>
                        </svg>
                    </div>
                    <p class="text-gray-600 font-medium">Click to upload or drag & drop</p>
                    <p class="text-gray-400 text-sm mt-1">PDF files only</p>
                </div>

                <input type="file" id="file-input" class="hidden" accept=".pdf" />
            </div>

            <!-- Status / Loading -->
            <div id="status-area" class="mt-6 hidden">
                <div class="flex items-center justify-center space-x-3 text-blue-600">
                    <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    <span class="font-medium">Processing your PDF...</span>
                </div>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="mt-4 p-3 bg-red-100 text-red-700 rounded-lg hidden text-sm text-center">
            </div>

        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const statusArea = document.getElementById('status-area');
        const errorDiv = document.getElementById('error-message');

        // Drag & Drop events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-active');
        });

        ['dragleave', 'dragend'].forEach(type => {
            dropZone.addEventListener(type, () => dropZone.classList.remove('drop-active'));
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-active');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                showError('Please upload a PDF file.');
                return;
            }

            // Reset UI
            errorDiv.classList.add('hidden');
            statusArea.classList.remove('hidden');
            dropZone.classList.add('pointer-events-none', 'opacity-50');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const text = await response.text();
                    let errorMessage = `Request failed (Status ${response.status})`;

                    try {
                        const data = JSON.parse(text);
                        if (data.error) errorMessage = data.error;
                    } catch (e) {
                        // Not JSON
                        if (text && text.trim().length > 0) {
                            errorMessage = `Server Error (${response.status}): ${text.substring(0, 100)}`;
                        } else {
                            errorMessage = `Server Error (${response.status}) - Empty Response`;
                        }
                    }
                    throw new Error(errorMessage);
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `converted_${file.name}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

            } catch (err) {
                showError(err.message);
            } finally {
                statusArea.classList.add('hidden');
                dropZone.classList.remove('pointer-events-none', 'opacity-50');
                fileInput.value = ''; // Reset input
            }
        }

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>

</html>
